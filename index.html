<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#5312B1" />
  <meta name="description" content="LingoLift — vocabulary learning with spaced repetition" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LingoLift" />
  <title>LingoLift</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="android-chrome-192x192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=62-deck-scroll" />
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.49.4"
      }
    }
  </script>
</head>
<body>
  <div id="app" class="app">
    <header class="top-bar">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1 class="brand-name">LingoLift</h1>
      </div>
      <p class="tagline" data-i18n="tagline">Spaced repetition</p>
    </header>

    <div id="sync-dynamic-row" class="sync-dynamic-row" aria-live="polite">
      <div class="sync-dynamic-row__inner">
        <p id="sync-status" class="sync-status sync-status--dynamic" role="status"></p>
      </div>
    </div>

    <div class="panel howto-panel howto-panel--compact">
      <button type="button" class="howto-summary" id="howto-toggle" aria-expanded="false" aria-controls="howto-content" data-i18n="howtoTitle">Info</button>
      <div id="howto-content" class="howto-expand" role="region" aria-labelledby="howto-toggle" aria-hidden="true">
        <div class="howto-expand__surf">
          <div class="howto-inner">
          <ul class="howto-list howto-list--compact">
            <li data-i18n-html="howtoLi1"></li>
            <li data-i18n-html="howtoLi2"></li>
            <li data-i18n-html="howtoLi3"></li>
            <li data-i18n-html="howtoLi4"></li>
            <li data-i18n-html="howtoLi5"></li>
            <li data-i18n-html="howtoLi6"></li>
            <li data-i18n-html="howtoLi7" class="howto-li--desktop"></li>
            <li data-i18n-html="howtoLi8"></li>
            <li data-i18n-html="howtoLi9" class="howto-li--mobile-swipe"></li>
          </ul>
          <p id="account-hint" class="howto-account-hint stats-line stats-line--sub" hidden></p>
          </div>
        </div>
      </div>
    </div>

    <main class="main">
      <!-- Dashboard -->
      <section id="view-dashboard" class="view view--active" aria-label="Dashboard">
        <div class="dashboard-grid">
        <div class="dashboard-grid__study-col">
        <div class="panel panel--review">
          <header class="review-card__head progress-head progress-head--single-line">
            <span class="progress-label" data-i18n="dueToday">Due now</span>
            <span id="progress-count" class="progress-count">0 / 0</span>
          </header>
          <p id="progress-grades-today" class="hint hint--muted progress-grades-today" hidden></p>
          <div id="due-brain-visual" class="due-brain-visual" aria-hidden="true" style="--brain-fill: 0">
            <svg class="due-brain-visual__svg" viewBox="0 0 100 98" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="dueBrainWaterGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                  <stop offset="0%" stop-color="#5b21b6" />
                  <stop offset="55%" stop-color="#7c3aed" />
                  <stop offset="100%" stop-color="#c084fc" />
                </linearGradient>
                <clipPath id="dueBrainShapeClip">
                  <path
                    d="M 33 9 Q 42 5 49 13 Q 50 16 51 13 Q 58 5 67 9 C 84 14 94 32 96 50 C 98 65 88 82 72 89 C 62 93 52 94 50 94 C 48 94 38 93 28 89 C 12 82 2 65 4 50 C 6 32 16 14 33 9 Z"
                  />
                </clipPath>
              </defs>
              <g clip-path="url(#dueBrainShapeClip)">
                <rect width="100" height="98" fill="var(--bg-elevated)" />
                <rect class="due-brain-visual__liquid" x="0" y="0" width="100" height="98" fill="url(#dueBrainWaterGrad)" />
                <path
                  class="due-brain-visual__sulcus"
                  fill="none"
                  stroke="rgba(255, 255, 255, 0.11)"
                  stroke-width="0.75"
                  stroke-linecap="round"
                  d="M 50 17 L 50 52 M 30 22 Q 22 32 26 44 M 70 22 Q 78 32 74 44 M 38 30 Q 50 26 62 30"
                />
              </g>
              <path
                class="due-brain-visual__outline"
                fill="none"
                stroke="rgba(168, 85, 247, 0.55)"
                stroke-width="1.15"
                stroke-linejoin="round"
                d="M 33 9 Q 42 5 49 13 Q 50 16 51 13 Q 58 5 67 9 C 84 14 94 32 96 50 C 98 65 88 82 72 89 C 62 93 52 94 50 94 C 48 94 38 93 28 89 C 12 82 2 65 4 50 C 6 32 16 14 33 9 Z"
              />
            </svg>
          </div>
          <label class="study-group-filter">
            <span class="study-group-filter__label field-label field-label--single-line" data-i18n="fieldStudyGroup">Group for review</span>
            <select id="select-study-group" class="select-lang study-group-filter__select" aria-label="Filter due cards by group"></select>
          </label>
          <div class="review-card__cta">
            <button type="button" class="btn btn--primary btn--large btn-text-nowrap btn-repeat-primary" id="btn-start-review" data-i18n="startReview">
              Repeat
            </button>
            <p id="review-hint" class="hint hint--muted"></p>
          </div>
        </div>
        </div>

        <div class="panel form-panel">
          <h2 class="panel-title panel-title--single-line panel-title--add-card" data-i18n="addCardTitle">Add card</h2>
          <form id="form-add-card" class="card-form">
            <div class="lang-pair-row" role="group" aria-label="Translation language pair">
              <label class="lang-pair-field">
                <span class="lang-pair-label" data-i18n="fieldSourceLang">Source language</span>
                <select id="select-lang-source" class="select-lang" aria-label="Source language for word">
                  <option value="pt">Portuguese</option>
                  <option value="en">English</option>
                  <option value="ru">Russian</option>
                  <option value="uk">Ukrainian</option>
                </select>
              </label>
              <span class="lang-pair-sep" aria-hidden="true">→</span>
              <label class="lang-pair-field">
                <span class="lang-pair-label" data-i18n="fieldTargetLang">Target language</span>
                <select id="select-lang-target" class="select-lang" aria-label="Target language for translation">
                  <option value="en">English</option>
                  <option value="ru">Russian</option>
                  <option value="uk">Ukrainian</option>
                  <option value="pt">Portuguese</option>
                </select>
              </label>
            </div>
            <div class="group-add-row">
              <label class="field field--group-select">
                <span class="field-label field-label--single-line" data-i18n="fieldCardGroup">Group</span>
                <select id="select-add-group" class="select-lang" aria-label="Save card in group"></select>
              </label>
              <label class="field field--new-group" id="label-new-group" aria-hidden="true">
                <span class="field-label field-label--single-line" data-i18n="fieldNewGroupName">New group name</span>
                <input
                  type="text"
                  id="input-new-group-name"
                  autocomplete="off"
                  data-i18n-placeholder="placeholderNewGroup"
                  placeholder="e.g. Travel"
                />
              </label>
            </div>
            <label class="field">
              <span class="field-label field-label--single-line" data-i18n="fieldWord">Word</span>
              <div class="field-word-wrap" id="field-word-wrap">
                <input
                  type="text"
                  id="input-word"
                  name="word"
                  list="datalist-words"
                  autocomplete="off"
                  data-i18n-placeholder="placeholderWord"
                  placeholder="e.g. casa"
                  required
                />
              </div>
            </label>
            <label class="field">
              <span class="field-label field-label--single-line" data-i18n="fieldTranslation">Translation</span>
              <div class="field-input-wrap">
                <input class="field-input--with-wand" type="text" id="input-translation" name="translation" autocomplete="off" data-i18n-placeholder="placeholderTranslation" placeholder="e.g. house" required />
                <button type="button" class="btn-translate-wand" id="btn-translate-wand" data-i18n-title="translateWandTooltip" title="Auto-translate" aria-label="Auto-translate">🪄</button>
              </div>
            </label>
            <button type="submit" class="btn btn--secondary btn--block btn-text-nowrap" data-i18n="addCardSubmit">Add card</button>
          </form>
        </div>

        <div class="panel stats-panel">
          <p class="stats-line stats-line--single-line"><span id="stat-total">0</span> <span data-i18n="statsDeckSuffix">cards in deck</span></p>
        </div>

        <div class="panel deck-panel" id="deck-panel">
          <button type="button" class="deck-panel__summary" id="deck-toggle" aria-expanded="false" aria-controls="deck-content" data-i18n="deckPanelTitle">
            My deck
          </button>
          <div id="deck-content" class="deck-panel__expand" role="region" aria-labelledby="deck-toggle" aria-hidden="true">
            <div class="deck-panel__inner">
              <div class="deck-toolbar">
                <input
                  type="search"
                  id="deck-search"
                  class="deck-search-input"
                  data-i18n-placeholder="deckSearchPlaceholder"
                  autocomplete="off"
                  aria-label="Search deck"
                />
                <select id="select-deck-group-filter" class="select-lang deck-filter-select" aria-label="Filter deck list by group"></select>
              </div>
              <div id="deck-list" class="deck-list"></div>
            </div>
          </div>
        </div>
        </div>
      </section>

      <!-- Study -->
      <section id="view-study" class="view" aria-label="Study" hidden aria-describedby="study-keys-hint">
        <div class="study-top">
          <button type="button" class="btn btn--ghost btn-text-nowrap" id="btn-exit-study" data-i18n="studyExit">← Exit</button>
          <div class="study-progress-meta">
            <span id="study-remaining-label" class="study-remaining study-remaining--single-line"></span>
            <div class="session-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="session-bar-wrap">
              <div id="session-bar-fill" class="session-fill"></div>
            </div>
          </div>
        </div>

        <div class="study-card-wrap">
          <div id="study-card" class="flash-card flash-card--swipeable" tabindex="-1">
            <p id="study-front" class="flash-front"></p>
            <div id="study-back-wrap" class="flash-back-wrap flash-back-wrap--closed" aria-hidden="true">
              <p class="flash-divider" aria-hidden="true"></p>
              <p id="study-back" class="flash-back"></p>
            </div>
          </div>
        </div>

        <div class="study-actions">
          <button type="button" class="btn btn--primary btn--large btn-text-nowrap" id="btn-show-answer" data-i18n="showAnswer">Show answer</button>
          <div id="grade-row" class="grade-row" hidden>
            <button type="button" class="btn btn--hard btn-text-nowrap" id="btn-hard">
              <span data-i18n="gradeHard">Hard</span> <span class="btn-sub" data-i18n="gradeHardSub">soon</span>
            </button>
            <button type="button" class="btn btn--easy btn-text-nowrap" id="btn-easy">
              <span data-i18n="gradeEasy">Easy</span> <span class="btn-sub" data-i18n="gradeEasySub">later</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <button type="button" class="btn-footer-sync" id="btn-force-sync">
        <span class="btn-footer-sync__text" data-i18n="forceSync">Cloud sync</span>
      </button>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <p id="study-keys-hint" class="visually-hidden" data-i18n="studyDesktopKeysHint"></p>
  </div>
  <datalist id="datalist-words"></datalist>
  <script src="js/app.js?v=67-deck-scroll-velocity" type="module"></script>
</body>
</html>
